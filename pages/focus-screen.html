<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专注页面</title>
    <script type="text/javascript" src="..\JS\jquery-3.7.1.min.js"></script>
    <script type="text/javascript" src="..\scripts\head.js"></script>
</head>
<style>
    *::selection {
        background-color: transparent;
    }

    *::-moz-selection {
        background-color: transparent;
    }

    *::-webkit-selection {
        background-color: transparent;
    }

    /*css terminal effect*/
    @keyframes flicker {
        0% {
            opacity: 0.15;
        }

        5% {
            opacity: 0.22;
        }

        10% {
            opacity: 0.12;
        }

        15% {
            opacity: 0.28;
        }

        20% {
            opacity: 0.15;
        }

        25% {
            opacity: 0.21;
        }

        30% {
            opacity: 0.18;
        }

        35% {
            opacity: 0.25;
        }

        40% {
            opacity: 0.11;
        }

        45% {
            opacity: 0.19;
        }

        50% {
            opacity: 0.26;
        }

        55% {
            opacity: 0.14;
        }

        60% {
            opacity: 0.21;
        }

        65% {
            opacity: 0.17;
        }

        70% {
            opacity: 0.23;
        }

        75% {
            opacity: 0.12;
        }

        80% {
            opacity: 0.20;
        }

        85% {
            opacity: 0.27;
        }

        90% {
            opacity: 0.16;
        }

        95% {
            opacity: 0.22;
        }

        100% {
            opacity: 0.18;
        }
    }

    /*扫描线滚动动画模拟刷新率差*/
    @keyframes scanline-scroll {
        0% {
            transform: translateY(0);
        }

        100% {
            transform: translateY(100vh);
        }
    }

    /*应用滤镜*/
    .crt-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 10;
        pointer-events: none;
        /*基础扫描线纹理*/
        background: linear-gradient(rgba(18, 16, 16, 0) 50%,
                rgba(0, 0, 0, 0.15) 50%),
            linear-gradient(90deg,
                rgba(55, 0, 0, 0.05),
                rgba(0, 55, 0, 0.03),
                rgba(0, 0, 55, 0.05));
        background-size: 100% 3px, 100% 100%;
    }

    /*随机闪烁与滚动线层*/
    .crt-overlay::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(18, 16, 16, 0.05);
        /* 同时挂载闪烁和滚动动画 */
        animation: flicker 0.12s infinite alternate;
    }

    /*额外：模拟那一根缓慢落下的扫描干扰线*/
    .crt-overlay::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 5px;
        background: rgba(255, 255, 255, 0.05);
        opacity: 0.3;
        animation: scanline-scroll 8s linear infinite;
    }

    /*end*/



    body {
        overflow: hidden;
        --background-line-color: color-mix(in srgb, var(--grey-1) 3%, transparent) !important;
        background-color: var(--custom-bg-color-0);
        background-size: 4rem 4rem !important;
        background-position: center center !important;
        background-image:
            linear-gradient(to right, var(--background-line-color) 0.1rem, transparent 1px),
            linear-gradient(to bottom, var(--background-line-color) 0.1rem, transparent 1px) !important;
    }

    :root {
        --custom-bg-color-0: rgb(28, 28, 28);
        --custom-primary-color: rgb(72, 233, 248);
    }

    .locked-content {
        height: 100dvh;
        width: 100%;
        background: transparent;
        display: flex;
        flex-direction: column;
        align-items: center;
        background-image: radial-gradient(circle at 3px 3px, color-mix(in srgb, var(--grey-1) 30%, transparent) 1px, transparent 0);
        background-size: 40px 40px;
    }

    .deco-x-cross-1 {
        width: 4rem;
        height: 4rem;


    }

    .deco-x-cross-2 {
        width: 4.2rem;
        height: 4.2rem;
        position: absolute;
        top: -0.1rem;
        filter: blur(4px) brightness(1.8);
        left: -0.1rem;
    }

    .title-container {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        border-top: 0.1rem solid color-mix(in srgb, var(--custom-primary-color) 10%, transparent);
        border-bottom: 0.1rem solid var(--grey-1);
        --sub-theme-color: var(--grey-4-07);
        background-image: repeating-linear-gradient(-45deg,
                color-mix(in srgb, var(--sub-theme-color) 2%, transparent) 0 8px,
                color-mix(in srgb, var(--sub-theme-color) 6%, transparent) 8px 16px);
        padding: 1rem 0 1rem 0;
        mask-image: linear-gradient(90deg, transparent 0%, black 30%, black 60%, transparent 100%);
    }

    .title-text {
        color: color-mix(in srgb, var(--custom-primary-color), var(--custom-bg-color-0) 10%);
        text-shadow: 0 0 4px var(--custom-primary-color);
        font-size: 1.2rem;
    }

    .title-text-2 {
        color: var(--grey-2-07);
        font-size: 0.6rem;
    }

    .title-img-container {
        position: relative;
        width: 4rem;
        color: var(--custom-primary-color);
        font-family: sans-serif;
        text-shadow: 1rem 1rem 1rem var(--custom-primary-color);
    }

    .center-container {
        height: 100%;
        flex: 1;
        margin: 1rem 0 1rem 0;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .clock-container {
        flex: 1;
        display: flex;
        flex-direction: row;
        margin: 0;
        background-color: transparent;
        border: 0.3rem solid var(--custom-primary-color);
        box-shadow: 0 0 8px var(--custom-primary-color);
        border-radius: 0.1rem;
        height: 13.8rem;
        width: auto;
    }

    .clock-left-container,
    .clock-right-container {
        height: 100%;
        background-color: transparent;
        width: 12rem;
        overflow: hidden;
        box-sizing: border-box;
    }

    .clock-left-container {
        border-right: 0.3rem solid var(--custom-primary-color);
    }

    .clock-right-container {
        border-left: 0.3rem solid var(--custom-primary-color);
    }

    .clock-top {
        height: 1.8rem;
        text-align: center;
        background: transparent;
        box-sizing: border-box;
    }

    .clock-bottom {
        text-align: center;
        height: 12rem;
        background: var(--custom-primary-color);
        display: flex;
        flex-direction: row;
        align-items: center;
        box-sizing: border-box;
    }

    #year-month,
    #info1 {
        color: var(--custom-primary-color);
        line-height: 1.8rem;
        text-shadow: 0 0 4px var(--custom-primary-color);
    }

    #date,
    #chinese-week-date {
        color: var(--custom-bg-color-0);
        font-size: 8rem;
        line-height: 12rem;
        width: 100%;
        font-family: "Jetbrains Mono";
        text-shadow: 0 0 4px var(--custom-primary-color) initial;
    }

    .clock-center-container {
        width: 20rem;
    }

    .central-clock {
        margin: 0.5rem 2rem 0 2rem;
    }

    .central-clock>span {
        font-size: 9rem;
        line-height: 13.3rem;
        text-shadow: 0 0 4px var(--custom-primary-color);
        width: 100%;
        font-family: "Jetbrains Mono";
        color: var(--custom-primary-color);
    }

    @keyframes fade-in {
        0% {
            transform: translateY(100px);
            opacity: 0;
            filter: blur(0);
        }

        100% {
            transform: translateY(0px);
            opacity: 1;
            filter: blur(0);
        }
    }

    #num-hour-1,
    #num-hour-2,
    #num-minute-1,
    #num-minute-2,
    #num-second-1,
    #num-second-2 {
        animation: fade-in 1s ease forwards;
    }
</style>

<body>
    <app-navbar_dis></app-navbar_dis>
    <div class="crt-overlay"></div>
    <div class="locked-content">
        <div class="title-container">
            <div class="title-img-container">
                <svg class="deco-x-cross-1" width="1rem" height="1rem" viewBox="0 0 100 100"
                    xmlns="http://www.w3.org/2000/svg">
                    <g stroke="currentColor" stroke-width="6" fill="none" stroke-linecap="square">
                        <path d="M20,20 L40,40" />

                        <path d="M60,60 L80,80" />

                        <path d="M80,20 L60,40" />

                        <path d="M40,60 L20,80" />
                    </g>
                </svg>
                <svg class="deco-x-cross-2" width="1rem" height="1rem" viewBox="0 0 100 100"
                    xmlns="http://www.w3.org/2000/svg">
                    <g stroke="currentColor" stroke-width="6" fill="none" stroke-linecap="square">
                        <path d="M20,20 L40,40" />

                        <path d="M60,60 L80,80" />

                        <path d="M80,20 L60,40" />

                        <path d="M40,60 L20,80" />
                    </g>
                </svg>
            </div>
            <span class="title-text">
                [ 已进入专注模式 ]
            </span>
            <span class="title-text-2">
                NOW :: ENTERED FOCUS MODE :: LOCKED
            </span>
        </div>
        <div class="center-container">
            <div class="clock-container">
                <div class="clock-left-container">
                    <div class="clock-top">
                        <span id="year-month">2026-4</span>
                    </div>
                    <div class="clock-bottom">
                        <span id="date">25</span>
                    </div>
                </div>
                <div class="central-clock">
                    <span id="num-hour-1">1</span><span id="num-hour-2">1</span>
                    <span class="sep">:</span>
                    <span id="num-minute-1">4</span><span id="num-minute-2">5</span>
                    <span class="sep">:</span>
                    <span id="num-second-1">1</span><span id="num-second-2">4</span>
                </div>
                <div class="clock-right-container">
                    <div class="clock-top">
                        <span id="info1">[WEEK]</span>
                    </div>
                    <div class="clock-bottom">
                        <span id="chinese-week-date">陆</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="text/javascript">
        $(document).ready(function () {
            function updateClock() {
                const now = new Date();

                // yyyy-mm
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                $('#year-month').text(`${year}-${month}`);

                // dd
                $('#date').text(now.getDate());

                // 更新时间数字
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const seconds = String(now.getSeconds()).padStart(2, '0');

                $('#num-hour-1').text(hours[0]);
                $('#num-hour-2').text(hours[1]);
                $('#num-minute-1').text(minutes[0]);
                $('#num-minute-2').text(minutes[1]);
                $('#num-second-1').text(seconds[0]);
                $('#num-second-2').text(seconds[1]);

                // 更新星期
                const weekDays = ['日', '壹', '贰', '叁', '肆', '伍', '陆'];
                $('#chinese-week-date').text(weekDays[now.getDay()]);
            }

            // 立即执行避免首屏等待1秒
            updateClock();
            // 每秒刷新一次
            setInterval(updateClock, 1000);
        });
    </script>
</body>

</html>
