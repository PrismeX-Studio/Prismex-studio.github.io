<template id="gird-panel-panel-template">
    <style>
        :host {
            display: block;
            --active-red: var(--primary-color);
            --text-gold: var(--secondary-color);
            --border-dark: var(--border-color);
        }

        .card-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 0.85;
            background-color: var(--background-color);
            border: 2px solid var(--border-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-sizing: border-box;
            padding: 20px;
            cursor: pointer;
            /* 过渡效果，让发光和颜色变化更平滑 */
            transition: 
                border-color 0.2s ease, 
                box-shadow 0.2s ease, 
                background-color 0.2s ease;
            overflow: hidden;
            border-radius: 4px;
        }

        .card-container:hover {
            border-color: var(--active-red);
            /* 外发光与内发光结合 */
            box-shadow: 0 0 20px color-mix(in srgb, var(--active-red) 20%, transparent), inset 0 0 15px color-mix(in srgb, var(--active-red) 10%, transparent);
        }

        /* --- 图标、标题、副标题样式 --- */
        .icon-box {
            width: 48px;
            height: 48px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--grey-4);
            /* Mask 配置 */
            mask-repeat: no-repeat;
            mask-size: contain;
            mask-position: center;
            
            transition: all 0.2s ease;
        }

        .card-container:hover .icon-box {
            background-color: var(--active-red);
            filter: drop-shadow(0 0 6px var(--active-red));
        }

        .icon-box img, .icon-box svg {
            width: 100%;
            height: 100%;
            /* 核心：使用 mask 控制形状 */
            background-color: var(--grey-2); /* 默认图标颜色 */
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-size: contain;
            mask-size: contain;
            -webkit-mask-position: center;
            mask-position: center;
            object-fit: contain;
        }

        .title {
            color: var(--grey-4);
            font-size: 14px;
            font-weight: 800;
            font-family: "Rajdhani";
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 6px;
            transition: color 0.2s ease;
        }

        .card-container:hover .title {
            color: var(--grey-1);
        }

        .subtitle {
            color: var(--text-gold);
            font-size: 12px;
            font-weight: 500;
            font-family: "Jetbrains Mono";
            opacity: 0.9;
        }
    </style>

    <div class="card-container">
        <div class="icon-box" id="icon-slot"></div>
        <div class="title" id="title-text"></div>
        <div class="subtitle" id="subtitle-text"></div>
    </div>
</template>
