<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="">
    <title>所有文章/代用搜索页</title>
    <!--import jQuery-min-->
    <script type="text/javascript" src="..\JS\jquery-3.7.1.min.js"></script>
    <style>
        #search-container {
            display: flex;
            gap: 2rem;
        }

        #search-right {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        #search-result-container {
            flex: 1;
            border-radius: 0.4rem;

            min-height: 20rem;
        }

        #search-result-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            background: linear-gradient(0deg, var(--primary-color) 0%, transparent 100%);
            opacity: 0.2;
            z-index: -1;
            pointer-events: none;
            mask: radial-gradient(circle at center, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0) 100%);
        }

        #search-result-topbar {
            height: fit-content;
            background-color: var(--bg-color-1);
            color: var(--primary-font-color);
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 0.6rem;
            border: 0.1rem solid var(--bg-color-3);
            border-radius: 0.4rem;
            overflow: hidden;
        }

        #search-result-topbar>hr {
            margin: 0;
            flex: 1;
        }

        .topbar-sub-container {
            gap: 0;
            width:max-content;
        }

        .topbar-sub-container-title {
            display: block;
            font-size: 0.6rem;
            color: var(--grey-1);
            margin: 0 0 0.2rem 0;
        }

        .topbar-sub-container-content {
            display: flex;
            flex-direction: row;
            align-items: center;
            column-gap: 0.4rem;
            margin: 0;
            padding: 0;
        }

        .topbar-sub-container-content>* {
            margin: 0 !important;
        }

        .topbar-sub-container-content>hr {
            margin: 0 !important;
        }

        .topbar-sub-container-content>button {
            font-size: 0.8rem;
            padding: 0.1rem 0.3rem 0.1rem 0.3rem;
            border: 0;
        }

        #search-result {
            margin-top: 0.6rem;
            gap: 1rem;
            display: flex;
            flex-direction: column;
            padding: 0.4rem 0 0 0;
            overflow: visible;
        }

        #search-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 10rem;
            border-radius: 0.4rem;
            background: var(--bg-color-1);
            border: 0.1rem solid var(--bg-color-3);
            padding: 2rem 0.4rem 2rem 0.4rem;
        }

        #search-placeholder>.error-cross {
            stroke: var(--grey-1);
            margin-bottom: 1rem;
        }

        .topbar-sub-container-box {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            width:max-content;
            /*force the elements stay in one line*/
            flex:0;
            gap: 0;
        }

        @media (max-width: 1000px) {
            #search-container {
                width: 100%;
                margin: 0;
                flex-direction: column-reverse;
            }
        }

        @media (max-width: 580px) {
            #search-result-topbar {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.4rem;
            }
            .topbar-sub-container-box {
                padding:0 0 0 0.3rem;
                width: 100%;
            }
        }
    </style>
    <script type="text/javascript" src="..\scripts\head.js"></script>
</head>


<body>
    <app-container>
        <app-navbar></app-navbar>
        <!--main-->
        <top-panel title="全部文档/搜索" sub-title="//STATUS::UNDER_CONSTRUCTION"></top-panel>
        <div class="content">
            <hr class="blank">
            <div id="search-container">
                <div id="search-result-container">
                    <div id="search-result-topbar">
                        <div class="topbar-sub-container">
                            <span class="topbar-sub-container-title">&nbsp排序方式 / SORTORD </span>
                            <div class="topbar-sub-container-content">
                                <button id="sort-by-type">类型</button>
                                <button id="sort-by-time">时间</button>
                                <button id="sort-by-relevance">相关度</button>
                                <button id="sort-by-author">作者</button>
                                <hr class="vertical"
                                    style="margin:1rem 0.4rem 1rem 0.4rem;height:1rem;border-width: 1.4px;">
                                <button id="sort-ascending-change">切换升降序</button>
                            </div>
                        </div>
                        <hr class="blank" style="width: unset;flex:1;">
                        <div class="topbar-sub-container-box">
                            <div class="topbar-sub-container"
                                style="padding-right:0.6rem;margin-right:0.6rem;border-right:0.1rem solid var(--grey-4)">
                                <span class="topbar-sub-container-title">结果数 / RESULTS </span>
                                <div class="topbar-sub-container-content">
                                    <h3 id="search-results-count">0</h3>
                                </div>
                            </div>
                            <div class="topbar-sub-container">
                                <span class="topbar-sub-container-title">搜索用时 / TIME SPENT </span>
                                <div class="topbar-sub-container-content">
                                    <h3 id="search-results-time">0ms</h3>
                                </div>
                            </div>
                        </div>

                    </div>
                    <div id="search-result">
                        <!--使用示例-->
                        <div id="search-placeholder">
                            <svg class="error-cross" width="60px" height="60px" viewBox="0 0 100 100"
                                xmlns="http://www.w3.org/2000/svg">
                                <g stroke="black" stroke-width="6" fill="none" stroke-linecap="square">
                                    <path d="M20,20 L30,30" />

                                    <path d="M70,70 L80,80" />

                                    <path d="M80,20 L70,30" />

                                    <path d="M30,70 L20,80" />
                                </g>
                            </svg>
                            <h2>当前未进行过搜索</h2>
                            <span style="color: var(--grey-1);">键入搜索内容并执行搜索以显示对应结果</span>
                        </div>

                        <!--搜索结果会以卡片的形式显示在这里，卡片包含标题、副标题、类型、标签、作者和发布时间等信息-->
                    </div>
                </div>

                <div id="search-right">
                    <h2>搜索</h2>
                    <input type="text" id="search-input" placeholder="请输入搜索内容...">
                    <!--支持支持正则表达式，当内容为空（即用户不输入时显示为所有内容）-->
                    <!--下拉框选择是否启用，默认不启用正则表达式-->
                    <select id="regex-select">
                        <option value="false">不启用正则表达式</option>
                        <option value="true">启用正则表达式</option>
                    </select>
                    <button id="search-button">执行搜索</button>
                </div>
            </div>
            <hr class="blank">
            
        </div>
        <script>
            //前端搜索实现
            let startTime = -1;
            //假设我们有一个包含所有文章数据的数组，格式如下：
            const ARTICLE_DATA = {
                '7d2e4f1a': {
                    title: "Perfect Craft 1.18.2",
                    subTitle: "游戏整合包",
                    type: "article",
                    tags: ["Minecraft", "整合包", "已过时/弃用"],
                    time: "2024-06-01",
                    author: "PrismeX团队",
                    href: "C-1.html"
                },
                'b8c0e9d2': {
                    title: "整合包安装教程",
                    subTitle: "使用指南",
                    type: "article",
                    tags: ["教程", "安装"],
                    time: "2024-06-01",
                    author: "PrismeX团队",
                    href: "C-2.html"
                },
                '3a5b7c8d': {
                    title: "辨别系统位数",
                    subTitle: "系统基础知识",
                    type: "article",
                    tags: ["教程", "系统"],
                    time: "2024-06-01",
                    author: "PrismeX团队",
                    href: "C-3.html"
                },
                'f1a2b3c4': {
                    title: "Mem Reduct",
                    subTitle: "软件推荐（旧）",
                    type: "article",
                    tags: ["工具", "内存优化", "等待翻新"],
                    time: "2024-06-01",
                    author: "PrismeX团队",
                    href: "C-4.html"
                },
                'e5d6f7a8': {
                    title: "Motrix",
                    subTitle: "软件推荐（旧）",
                    type: "article",
                    tags: ["工具", "下载器", "等待翻新"],
                    time: "2024-06-01",
                    author: "PrismeX团队",
                    href: "C-5.html"
                },
                '9b0a1c2d': {
                    title: "Neat Download Manager",
                    subTitle: "软件推荐（旧）",
                    type: "article",
                    tags: ["工具", "下载器", "等待翻新"],
                    time: "2024-06-01",
                    author: "PrismeX团队",
                    href: "C-6.html"
                },
                '4e5f6a7b': {
                    title: "Watt Toolkit",
                    subTitle: "软件推荐（旧）",
                    type: "article",
                    tags: ["工具", "加速器", "等待翻新"],
                    time: "2024-06-01",
                    author: "PrismeX团队",
                    href: "C-7.html"
                },'9e0b1d2c': {
                    title: "再论优绩主义",
                    subTitle: "以阿尔都塞理论为工具批判当代优绩主义",
                    type: "article",
                    tags: ["文章", "转载", "[临时]新版样式测试","曹邓一"],
                    time: "2026-01-10",
                    author: "四川大学化学学院 杨梓清",
                    href: "[article]meritocracy-2.html"
                }
            };
            //当用户点击搜索按钮时，执行搜索逻辑
            $('#search-button').click(function () {
                console.log("1")
                //获取逻辑执行开始时间
                startTime = performance.now();
                const query = $('#search-input').val().trim();
                const useRegex = $('#regex-select').val() === 'true';
                let results = [];

                if (useRegex) {
                    try {
                        const regex = new RegExp(query, 'i');
                        for (const key in ARTICLE_DATA) {
                            const article = ARTICLE_DATA[key];
                            if (regex.test(article.title) || regex.test(article.subTitle) || regex.test(article.type) || article.tags.some(tag => regex.test(tag)) || regex.test(article.author)) {
                                results.push(article);
                            }
                        }
                    } catch (e) {
                        alert('正则表达式无效，请检查后重试。');
                        return;
                    }
                } else {
                    for (const key in ARTICLE_DATA) {
                        const article = ARTICLE_DATA[key];
                        if (article.title.includes(query) || article.subTitle.includes(query) || article.type.includes(query) || article.tags.some(tag => tag.includes(query)) || article.author.includes(query)) {
                            results.push(article);
                        }
                    }
                }

                //在页面上显示搜索结果
                $('#search-result').empty();
                results.forEach(article => {
                    $('#search-result').append(`
                        <search-result-card href="${article.href}" title="${article.title}" sub-title="${article.subTitle}" type="${article.type}" tags='${JSON.stringify(article.tags)}' author="${article.author}" time="${article.time}"></search-result-card>
                    `);
                });

                //更新结果数
                $('#search-results-count').text(results.length);
                //更新搜索用时
                const endTime = performance.now();
                const finaltime = (endTime - startTime).toFixed(1);
                $('#search-results-time').text(`${finaltime}ms`); //替换为实际的搜索用时

            });
        </script>
        <app-footer></app-footer>
    </app-container>
</body>

</html>
