<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="">
    <title>所有文章/代用搜索页</title>
    <!--import jQuery-min-->
    <script type="text/javascript" src="..\JS\jquery-3.7.1.min.js"></script>
    <style>
        #search-container {
            display: flex;
            gap: 2rem;
        }

        #search-right {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        #search-result-container {
            flex: 1;
            border-radius: 0.4rem;
            overflow: auto;
            min-height: 20rem;
        }

        #search-result-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            background: linear-gradient(0deg, var(--primary-color) 0%, transparent 100%);
            opacity: 0.2;
            z-index: -1;
            pointer-events: none;
            mask: radial-gradient(circle at center, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0) 100%);
        }

        #search-result-topbar {
            height: fit-content;
            background-color: var(--bg-color-1);
            color: var(--primary-font-color);
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 0.6rem;
            border: 0.1rem solid var(--bg-color-3);
            border-radius: 0.4rem;
        }

        #search-result-topbar>hr {
            margin: 0;
            flex: 1;
        }

        .topbar-sub-container {
            gap: 0;
        }

        .topbar-sub-container-title {
            display: block;
            font-size: 0.6rem;
            color: var(--grey-1);
            margin: 0 0 0.2rem 0;
        }

        .topbar-sub-container-content {
            display: flex;
            flex-direction: row;
            align-items: center;
            column-gap: 0.4rem;
            margin: 0;
            padding: 0;
        }

        .topbar-sub-container-content>* {
            margin: 0 !important;
        }

        .topbar-sub-container-content>hr {
            margin: 0 !important;
        }

        .topbar-sub-container-content>button {
            font-size: 0.8rem;
            padding: 0.1rem 0.3rem 0.1rem 0.3rem;
            border: 0;
        }

        #search-result {
            gap: 0.4rem;
            display: flex;
            flex-direction: column;
            padding: 0.4rem 0 0 0;
        }

        @media (max-width: 1000px) {
            #search-container {
                width: 100%;
                margin: 0;
                flex-direction: column-reverse;
            }
        }
    </style>
    <script type="text/javascript" src="..\scripts\head.js"></script>
</head>


<body>
    <app-container>
        <app-navbar></app-navbar>
        <!--main-->
        <top-panel title="全部文档/搜索" sub-title="//STATUS::UNDER_CONSTRUCTION"></top-panel>
        <div class="content">
            <hr class="blank">
            <div id="search-container">
                <div id="search-result-container">
                    <div id="search-result-topbar">
                        <div class="topbar-sub-container">
                            <span class="topbar-sub-container-title">&nbsp排序方式 / SORTORD </span>
                            <div class="topbar-sub-container-content">
                                <button id="sort-by-type">类型</button>
                                <button id="sort-by-time">时间</button>
                                <button id="sort-by-relevance">相关度</button>
                                <button id="sort-by-author">作者</button>
                                <hr class="vertical"
                                    style="margin:1rem 0.4rem 1rem 0.4rem;height:1rem;border-width: 1.4px;">
                                <button id="sort-ascending-change">切换升降序</button>
                            </div>
                        </div>

                        <hr class="blank">

                        <div class="topbar-sub-container"
                            style="padding-right:0.6rem;margin-right:0.6rem;border-right:0.1rem solid var(--grey-4)">
                            <span class="topbar-sub-container-title">结果数 / RESULTS </span>
                            <div class="topbar-sub-container-content">
                                <h3 id="search-results-count">0</h3>
                            </div>
                        </div>
                        <div class="topbar-sub-container">
                            <span class="topbar-sub-container-title">搜索用时 / TIME SPENT </span>
                            <div class="topbar-sub-container-content">
                                <h3 id="search-results-time">0ms</h3>
                            </div>
                        </div>
                    </div>
                    <div id="search-result">
                        <!--使用示例-->
                        <search-result-card title="注意：以下为AI生成内容" sub-title="全是ky还一点用没有" type="？" tags='["tag1","tag2"]'
                            author="作者A" time="2024-06-01"></search-result-card>
                        <search-result-card title="关于 Level █ 内非线性拓扑结构的熵增报告" sub-title="在排除观察者效应后，该区域表现出明显的现实锚点剥离机制"
                            type="模因档案" tags='["非欧几何", "熵增波动"]' author="站点 19 研究员 alpha"
                            time="2042-13-13"></search-result-card>
                        <search-result-card title="异构实体在序贯协议中的认知应答一致性评估" sub-title="基于既往接触史与模因污染水平在时空维度上的交叉验证"
                            type="异常共识" tags='["认知对冲", "污染等级"]' author="后室应急小组" time="2025-07-32"></search-result-card>
                        <search-result-card title="层级 穩態失衡诱发的代偿性现实偏差分析" sub-title="通过对基准线水平的动态捕捉还原区域崩溃的潜在逻辑链条"
                            type="层级初探" tags='["现实重塑", "坍塌机制"]' author="特约研究员 [数据删除]"
                            time="2024-08-15"></search-result-card>
                        <search-result-card title="针对不可观测实体特征的认知降噪与模拟提取" sub-title="论复杂反模因对象在认知模型中的拟合优度与实际收容意义"
                            type="收容方法论" tags='["反模因", "拟合偏差"]' author="数据安全中心" time="2026-01-05"></search-result-card>
                        <search-result-card title="多中心横断面调研：关于异常主诉模糊性的分层干预" sub-title="分析个体认知差异对标准化收容路径产生的非结构化扰动"
                            type="异常报告" tags='["分层干预", "认知受损"]' author="Dr. [REDACTED]"
                            time="1999-12-20"></search-result-card>
                        <search-result-card title="潜在现实扭曲因子的隐匿性特征及其对预后的干扰路径" sub-title="在全周期收容管理框架下重新审视极低概率事件的认知权重"
                            type="O5 指令" tags='["风险评估", "权重置换"]' author="O5 Council"
                            time="2026-02-14"></search-result-card>
                        <search-result-card title="？？？" sub-title="？？？" type="教程" tags='["tag1","tag2"]'
                            author="作者A" time="2024-06-01"></search-result-card>
                        <!--搜索结果会以卡片的形式显示在这里，卡片包含标题、副标题、类型、标签、作者和发布时间等信息-->
                    </div>
                </div>

                <div id="search-right">
                    <h2>搜索</h2>
                    <input type="text" id="search-input" placeholder="请输入搜索内容...">
                    <!--支持支持正则表达式，当内容为空（即用户不输入时显示为所有内容）-->
                    <!--下拉框选择是否启用，默认不启用正则表达式-->
                    <select id="regex-select">
                        <option value="false">不启用正则表达式</option>
                        <option value="true">启用正则表达式</option>
                    </select>
                    <button id="search-button">执行搜索</button>
                </div>
            </div>
            <hr class="blank">
            <p style="font-size: 14px;">
                注意：正在开发中，不代表最终设计，敬请期待。
            </p>
            <hr class="blank">
        </div>
        <script>
            //前端搜索实现
            let startTime = -1;
            //假设我们有一个包含所有文章数据的数组，格式如下：
            const ARTICLE_DATA = {
                'article1': {
                    title: "title1",
                    subTitle: "subtitle1",
                    type: "article",
                    tags: ["taga", "tagb"],
                    time: "2024-06-01",
                    author: "author1"
                }, 'article2': {
                    title: "title2",
                    subTitle: "subtitle2",
                    type: "article",
                    tags: ["tagc", "tagd"],
                    time: "2024-06-02",
                    author: "author2"
                }
                //...更多文章数据
            };
            //当用户点击搜索按钮时，执行搜索逻辑
            $('#search-button').click(function () {
                console.log("1")
                //获取逻辑执行开始时间
                startTime = performance.now();
                const query = $('#search-input').val().trim();
                const useRegex = $('#regex-select').val() === 'true';
                let results = [];

                if (useRegex) {
                    try {
                        const regex = new RegExp(query, 'i');
                        for (const key in ARTICLE_DATA) {
                            const article = ARTICLE_DATA[key];
                            if (regex.test(article.title) || regex.test(article.subTitle) || regex.test(article.type) || article.tags.some(tag => regex.test(tag)) || regex.test(article.author)) {
                                results.push(article);
                            }
                        }
                    } catch (e) {
                        alert('正则表达式无效，请检查后重试。');
                        return;
                    }
                } else {
                    for (const key in ARTICLE_DATA) {
                        const article = ARTICLE_DATA[key];
                        if (article.title.includes(query) || article.subTitle.includes(query) || article.type.includes(query) || article.tags.some(tag => tag.includes(query)) || article.author.includes(query)) {
                            results.push(article);
                        }
                    }
                }

                //在页面上显示搜索结果
                $('#search-result').empty();
                results.forEach(article => {
                    $('#search-result').append(`
                        <search-result-card title="${article.title}" sub-title="${article.subTitle}" type="${article.type}" tags='${JSON.stringify(article.tags)}' author="${article.author}" time="${article.time}"></search-result-card>
                    `);
                });

                //更新结果数
                $('#search-results-count').text(results.length);
                //更新搜索用时
                const endTime = performance.now();
                const finaltime = (endTime - startTime).toFixed(1);
                $('#search-results-time').text(`${finaltime}ms`); //替换为实际的搜索用时

            });
        </script>
        <app-footer></app-footer>
    </app-container>
</body>

</html>
