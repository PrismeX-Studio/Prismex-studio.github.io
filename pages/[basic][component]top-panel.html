<template id="top-panel-template">
    <style>
        .top {
            width: 100%;
            padding: 4rem 6rem 4rem 6rem;
            --theme-color: var(--primary-color);
            border-bottom: 0.2rem solid var(--theme-color);
            background: linear-gradient(transparent, 63%, color-mix(in srgb, 40% var(--theme-color), transparent));
            display: flex;
            flex-direction: row;
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
        }

        .main-deco {
            position: absolute;
            bottom: -8rem;
            right: 1rem;
            width: 20rem;
            z-index: -1;
            margin: 0;
            filter: drop-shadow(-2rem 0 0 rgba(100, 100, 100, 0.4)) drop-shadow(-4rem 0 0 rgba(100, 100, 100, 0.3)) drop-shadow(-6rem 0 0 rgba(100, 100, 100, 0.2)) drop-shadow(23662px 0 0 var(--bg-color-2));
            transform: translate(-23662px);
        }

        .top-title,
        .top-sub-title {
            font-weight: bold;
            font-family: "JetBrains Mono" !important;
        }

        .top-title {
            font-size: 3rem !important;
            font-weight: bold;
            color: var(--primary-font-color);
            text-shadow: 0 0 8px rgba(100, 100, 100, 0.6);
        }

        .top-sub-title {
            text-shadow: 0 0 8px rgba(100, 100, 100, 0.6);
            margin: 0 0 0.4rem 0;
            font-size: 1rem;
        }

        .top-title-container {
            border-left: 0rem solid transparent;
            padding-left: 2.5rem;
            height: min-content;
            position: relative;
        }

        .top-title-container-deco-1 {
            position: absolute;
            top: 0px;
            left: 0px;
            width: 0.6rem;
            height: 100%;
            background-color: var(--theme-color);
            box-shadow: 0 0 12px var(--theme-color);
        }

        .top-title-container>* {
            font-family: "Rajdhani";
        }

        .top-title {
            font-size: 4.7rem;
        }

        .top-deco-block-1 {
            position: absolute;
            z-index: -1;
            width: calc(100% - 2*96px);
            height: 4rem;
            margin: 0 0 0 0;
            --sub-theme-color: var(--grey-4-07);
            background-image: repeating-linear-gradient(-45deg,
                    color-mix(in srgb, var(--sub-theme-color) 3%, transparent) 0 8px,
                    color-mix(in srgb, var(--sub-theme-color) 25%, transparent) 8px 16px);
        }

        .top-deco-x-cross-1,
        .top-deco-x-cross-2 {
            position: absolute;
            z-index: 1;
            opacity: 0.4;
        }

        .top-deco-x-cross-1 {
            top: 2rem;
            right: 2rem;
        }

        .top-deco-x-cross-2 {
            top: 6rem;
            right: 2rem;
        } 

        @media (max-width: 600px) {
            .top {
                padding: 3rem 1rem 3rem 2rem;
            }

            .top-deco-block-1 {
                width: calc(100% - 4.1rem);
                height: 2.8rem;
                margin: 0 0 0 0;
            }

            .top-title-container {
                padding-left: 1.5rem;
            }

            .top-title {
                font-size: 2rem !important;
            }

            .top-sub-title {
                font-size: 0.6rem;
            }

            .main-deco {
                width: 12rem;
                bottom: -6rem;
            }

            .top-deco-x-cross-1 {
                top: 1rem;
                right: 1rem;
                width:2.8rem;
            }

            .top-deco-x-cross-2 {
                top: 4.2rem;
                right: 1rem;
                width:2.8rem;
            }
        }
    </style>
    <div class="top">
        <div class="top-title-container">
            <h1 class="top-title">
                <txt style="color:var(--secondary-color);margin: 0;">[</txt><placeholder></placeholder><txt style="color:var(--secondary-color)">]</txt>
            </h1>
            <h2 class="top-sub-title">
                STATUS::ERROR
            </h2>
            <div class="top-title-container-deco-1"></div>

        </div>
        <img class="main-deco"
            src="data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1000 1000'%3E%3Crect fill='none' width='1000' height='1000'/%3E%3Cg opacity='0.9'%3E%3Crect fill='%234d4d4d' x='337.2' y='337.2' width='325.6' height='325.6' transform='translate(-207.1 500) rotate(-45)'/%3E%3C/g%3E%3Cpolygon fill='%234d4d4d' opacity='0.9' points='500,178.4 636,314.4 695.9,254.4 500,58.5 304.1,254.4 364,314.4 500,178.4'/%3E%3Cpolygon fill='%234d4d4d' opacity='0.9' points='821.6,500 685.6,636 745.6,695.9 941.5,500 745.6,304.1 685.6,364 821.6,500'/%3E%3Cpolygon fill='%234d4d4d' opacity='0.9' points='500,821.6 364,685.6 304.1,745.6 500,941.5 695.9,745.6 636,685.6 500,821.6'/%3E%3Cpolygon fill='%234d4d4d' opacity='0.9' points='178.4,500 314.4,364 254.4,304.1 58.5,500 254.4,695.9 314.4,636 178.4,500'/%3E%3C/svg%3E">
        <div class="top-deco-block-1"></div>
        <svg class="top-deco-x-cross-1" width="60px" height="60px" viewBox="0 0 100 100"
            xmlns="http://www.w3.org/2000/svg">
            <g stroke="black" stroke-width="4" fill="none" stroke-linecap="square">
                <path d="M20,20 L40,40" />

                <path d="M60,60 L80,80" />

                <path d="M80,20 L60,40" />

                <path d="M40,60 L20,80" />
            </g>
        </svg>
        <svg class="top-deco-x-cross-2" width="60px" height="60px" viewBox="0 0 100 100"
            xmlns="http://www.w3.org/2000/svg">
            <g stroke="black" stroke-width="4" fill="none" stroke-linecap="square">
                <path d="M20,20 L40,40" />

                <path d="M60,60 L80,80" />

                <path d="M80,20 L60,40" />

                <path d="M40,60 L20,80" />
            </g>
        </svg>

    </div>
</template>
